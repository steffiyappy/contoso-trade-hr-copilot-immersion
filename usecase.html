<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Use case · Contoso Trade HR Copilot Immersion</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<script>if(sessionStorage.getItem("ct_unlocked")!=="1"){location.replace("index.html");}</script>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="workshop.html">
      <div class="brand-mark">CT</div>
      <div class="brand-text"><span>Contoso Trade</span><small>HR · Copilot Immersion</small></div>
    </a>
    <div class="nav-links">
      <a href="workshop.html">Workshop</a>
      <a href="workshop.html#cases" class="active">Use cases</a>
      <a href="workshop.html#licensing">Licensing</a>
      <a href="workshop.html#agenda">Agenda</a>
    </div>
  </div>
</nav>

<header class="uc-hero">
  <div class="container">
    <div class="crumb"><a href="workshop.html">Workshop</a> · <a href="workshop.html#cases">Use cases</a> · <span id="crumb"></span></div>
    <div id="uc-head"></div>
  </div>
</header>

<section class="block">
  <div class="container" id="uc-body"></div>
</section>

<footer>
  Contoso Trade · HR Copilot Immersion · <a href="workshop.html#cases">← back to all use cases</a>
</footer>

<script src="assets/data.js"></script>
<script>
function fitClass(f){return f==="GOOD"?"fit-good":f==="PARTIAL"?"fit-partial":"fit-limited"}
function fitText(f){return f==="GOOD"?"✅ Strong fit":f==="PARTIAL"?"⚠️ Partial fit":"🔴 Limited"}
function prioClass(p){return p==="High"?"high":"med"}
function esc(s){return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}

const id = (location.hash||"").replace("#","") || "01-hr-analytics";
const uc = window.CT_USE_CASES.find(u=>u.id===id) || window.CT_USE_CASES[0];

document.getElementById("crumb").textContent = uc.title;
document.title = `${uc.title} · Contoso Trade HR Copilot Immersion`;

document.getElementById("uc-head").innerHTML = `
  <h1>${esc(uc.title)}</h1>
  <p style="color:var(--muted);max-width:820px;margin:0 0 6px;font-size:15px;line-height:1.55">${esc(uc.pain)}</p>
  <div class="uc-meta">
    <span class="bdg ${prioClass(uc.priority)}">${uc.priority} priority</span>
    <span class="bdg ${fitClass(uc.fit)}">${fitText(uc.fit)}</span>
    <span class="bdg" style="background:var(--chip);color:var(--ink);border:1px solid var(--border)">${esc(uc.fitLabel)}</span>
    ${uc.apps.map(a=>`<span class="app paid">${esc(a.name)}</span>`).join("")}
  </div>`;

const painsHtml = (uc.pains||[]).map(p=>`<li>${esc(p)}</li>`).join("");
const flowHtml = (uc.flow||[]).map((s,i)=>`
  <div class="flow-step">
    <div class="n">${i+1}</div>
    <div>
      <h4>${esc(s.title)} <span class="app-mini">${esc(s.app)}</span></h4>
      <p>${esc(s.desc)}</p>
    </div>
  </div>`).join("");

let promptsHtml = "";
const filesByCat = {};
(uc.files||[]).forEach(f=>{
  (f.useWith||[]).forEach(c=>{ (filesByCat[c]=filesByCat[c]||[]).push(f.name); });
});
Object.keys(uc.prompts||{}).forEach(cat=>{
  const items = uc.prompts[cat].map(p=>`
    <div class="prompt">${esc(p)}<button class="prompt-copy" onclick="copyPrompt(this)">Copy</button></div>`).join("");
  const fileHint = filesByCat[cat] ? `<div class="cat-file-hint">📂 Open / attach: ${filesByCat[cat].map(n=>`<a href="data/${encodeURIComponent(n)}" download class="kbd">${esc(n)}</a>`).join(" + ")}</div>` : "";
  promptsHtml += `<div class="prompt-cat"><h4>${esc(cat)}</h4>${fileHint}${items}</div>`;
});

document.getElementById("uc-body").innerHTML = `
  <div class="uc-grid">
    <div class="panel">
      <h3><span class="ico">⚠️</span> Pain points today</h3>
      <ul>${painsHtml}</ul>
      <h3 style="margin-top:18px"><span class="ico">🎯</span> Expected outcome</h3>
      <p style="color:var(--muted);font-size:14px;margin:0;line-height:1.6">${esc(uc.expected||"")}</p>
    </div>
    <div class="panel">
      <h3><span class="ico">🚀</span> Step-by-step walkthrough</h3>
      ${flowHtml}
    </div>
  </div>

  ${(uc.feasible||uc.notFeasible) ? `
  <div style="margin-top:22px" class="panel">
    <h3><span class="ico">📂</span> Files for this exercise</h3>
    ${(uc.files && uc.files.length) ? `
      <div class="howto">
        <b>How this works:</b> these are <b>raw, editable files</b> — download them, open in Excel/Word (or attach to M365 Copilot Chat), then run the prompts in the next section. You can edit the data and re-run — it's your sandbox.
      </div>
      <ul class="file-list">
        ${uc.files.map(f=>`
          <li>
            <div class="file-row">
              <a class="file-link" href="${esc(f.file)}" download><span class="file-ico">⬇</span><span class="file-name">${esc(f.name)}</span></a>
              <span class="file-why">${esc(f.why)}</span>
            </div>
            ${f.how?`<div class="file-how"><b>How to use:</b> ${esc(f.how)}</div>`:""}
            ${(f.useWith && f.useWith.length)?`<div class="file-use">Use with the prompts under: ${f.useWith.map(c=>`<span class="kbd">${esc(c)}</span>`).join(" ")}</div>`:""}
          </li>`).join("")}
      </ul>`:`<p style="color:var(--muted);margin:0;font-size:13.5px">No source file needed — this is a <b>live exercise</b> (drafting from scratch / Copilot in Teams meeting recap).</p>`}
  </div>

  <div style="margin-top:22px" class="panel">
    <h3><span class="ico">🧪</span> M365 Copilot feasibility check</h3>
    <p style="color:var(--muted);margin:0 0 10px;font-size:13.5px">An honest read of what paid M365 Copilot can deliver today vs. what needs other tools.</p>
    <div class="feas-grid">
      ${uc.feasible ? `<div class="feas-col feas-yes"><h4>✅ Feasible with M365 Copilot</h4><ul>${(uc.feasible||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`:""}
      ${uc.notFeasible ? `<div class="feas-col feas-no"><h4>🚧 Beyond Copilot — needs other tools</h4><ul>${(uc.notFeasible||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`:""}
    </div>
  </div>`:""}

  <div style="margin-top:22px" class="panel">
    <h3><span class="ico">💬</span> Try these prompts</h3>
    <p style="color:var(--muted);margin:0 0 8px;font-size:13.5px">Copy &amp; paste into the relevant Copilot surface. Replace <span class="kbd">[bracketed]</span> values with your specifics.</p>
    ${promptsHtml}
    ${uc.tip ? `<div class="tips"><b>💡 Pro-tip:</b> ${uc.tip}</div>` : ""}
    ${uc.beyond ? `<div class="beyond">${uc.beyond}</div>` : ""}
  </div>

  <div style="margin-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <a class="btn" href="workshop.html#cases">← All use cases</a>
    <div style="display:flex;gap:8px">
      ${uc.num>1 ? `<a class="btn" href="usecase.html#${window.CT_USE_CASES[uc.num-2].id}">← ${esc(window.CT_USE_CASES[uc.num-2].title)}</a>`:""}
      ${uc.num<window.CT_USE_CASES.length ? `<a class="btn btn-primary" href="usecase.html#${window.CT_USE_CASES[uc.num].id}">${esc(window.CT_USE_CASES[uc.num].title)} →</a>`:""}
    </div>
  </div>
`;

function copyPrompt(btn){
  const text = btn.parentElement.childNodes[0].textContent.trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied"; btn.classList.add("ok");
    setTimeout(()=>{btn.textContent="Copy"; btn.classList.remove("ok")},1500);
  });
}
window.addEventListener("hashchange",()=>location.reload());
</script>
</body>
</html>
