<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contoso Trade HR · Copilot Immersion</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="lock-body">
  <div class="lock-wrap">
    <div class="lock-card">
      <div class="lock-logo">CT</div>
      <h1 class="lock-title">Contoso Trade HR · Copilot Immersion</h1>
      <p class="lock-sub">Enter the session password to continue.</p>
      <hr />
      <form id="pwForm" autocomplete="off">
        <div class="pw-wrap">
          <input id="pw" type="password" placeholder="Session password" autofocus />
          <button type="button" id="pwToggle" class="pw-toggle" aria-label="Show password" title="Show password">
            <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeHide" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 4.22-5.22"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.86 19.86 0 0 1-3.17 4.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <button type="submit">Enter Workshop →</button>
        <p id="err" class="err hidden">Incorrect password — try again.</p>
      </form>
      <p class="lock-foot">Microsoft 365 Copilot · HR Department Showcase</p>
    </div>
  </div>

<script>
  const HASH = "563acfd5781fed51599ece1ca53d2767931c7a13eca8ba1520b5e5a84e5cbe79";
  async function sha256(s){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  document.getElementById("pwToggle").addEventListener("click", ()=>{
    const i = document.getElementById("pw");
    const show = document.getElementById("eyeShow");
    const hide = document.getElementById("eyeHide");
    const isPw = i.type === "password";
    i.type = isPw ? "text" : "password";
    show.classList.toggle("hidden", isPw);
    hide.classList.toggle("hidden", !isPw);
    i.focus();
  });
  if (sessionStorage.getItem("ct_unlocked")==="1"){ location.replace("workshop.html"); }
  document.getElementById("pwForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const v = document.getElementById("pw").value.trim();
    const h = await sha256(v);
    if (h === HASH){
      sessionStorage.setItem("ct_unlocked","1");
      location.href = "workshop.html";
    } else {
      document.getElementById("err").classList.remove("hidden");
    }
  });
</script>
</body>
</html>
